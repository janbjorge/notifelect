name: Test notifelect

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dev-env
        run: uv sync --extra dev

      - name: Ruff check
        if: ${{ always() }}
        run: uv run ruff check .

      - name: Ruff format
        if: ${{ always() }}
        run: uv run ruff format . --check

      - name: Mypy
        if: ${{ always() }}
        run: uv run mypy .

  test-notifelect:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest]

    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install notifelect
        run: uv sync --extra dev

      - name: Full test
        run: uv run pytest -vs
